<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daejeon Arctic Project - Sign Up</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="login-body">
    <!-- Background patterns -->
    <div class="login-bg-pattern">
        <div class="login-bg-blob1"></div>
        <div class="login-bg-blob2"></div>
    </div>

    <!-- Penguin Mascot -->
    <div class="penguin-container">
        <div class="penguin-speech">
            <p>환영한다 친구!</p>
            <p>함께 대전을 탐험하자!</p>
        </div>
    </div>

    <!-- Signup Form -->
    <div class="login-card">
        <h1>회원가입</h1>
        <p class="subtitle">Arctic Project</p>

        <form class="login-form" id="signupForm">
            <div class="input-group">
                <input type="email" id="email" placeholder="이메일" required>
            </div>
            <div class="input-group">
                <input type="text" id="nickname" placeholder="닉네임" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="비밀번호 (최소 6자)" required minlength="6">
            </div>
            <div class="input-group">
                <input type="password" id="passwordConfirm" placeholder="비밀번호 확인" required>
            </div>
            <button type="submit" class="btn-primary">회원가입 →</button>
        </form>

        <div class="social-login">
            <a href="/" class="signup-link">이미 계정이 있으신가요? 로그인</a>
        </div>
    </div>

    <!-- Supabase 초기화 및 회원가입 로직 -->
 <!-- Supabase 초기화 및 회원가입 로직 -->
    <script>
        // Flask에서 전달받은 환경변수
        const SUPABASE_URL = "{{ supabase_url }}";
        const SUPABASE_ANON_KEY = "{{ supabase_key }}";
        
        // Supabase 클라이언트 생성
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        console.log("✅ Supabase 연결 완료!");

        // 페이지 로드 완료 후 실행
        window.addEventListener('load', function() {
            console.log("✅ 페이지 로드 완료!");
            
            const form = document.getElementById('signupForm');
            console.log("폼 찾기:", form);
            
            if (!form) {
                console.error("❌ signupForm을 찾을 수 없습니다!");
                return;
            }
            
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                console.log("✅ 폼 제출!");
                
                const email = document.getElementById('email').value;
                const nickname = document.getElementById('nickname').value;
                const password = document.getElementById('password').value;
                const passwordConfirm = document.getElementById('passwordConfirm').value;
                
                console.log("입력값:", { email, nickname });
                
                // 비밀번호 확인
                if (password !== passwordConfirm) {
                    alert('❌ 비밀번호가 일치하지 않습니다!');
                    return;
                }
                
                try {
                    console.log("회원가입 시도 시작...");
                    
                    // 1. Supabase Auth에 회원가입
                    const { data: authData, error: authError } = await supabaseClient.auth.signUp({
                        email: email,
                        password: password
                    });
                    
                    if (authError) throw authError;
                    
                    console.log('✅ Auth 가입 성공:', authData);
                    
                    // 2. profiles 테이블에 닉네임 저장
                    const { error: profileError } = await supabaseClient
                        .from('profiles')
                        .insert({
                            id: authData.user.id,
                            email: email,
                            nickname: nickname
                        });
                    
                    if (profileError) throw profileError;
                    
                    alert('✅ 회원가입 성공! 로그인 페이지로 이동합니다.');
                    console.log('✅ 회원가입 완료!');
                    window.location.href = '/';
                    
                } catch (error) {
                    alert('❌ 회원가입 실패: ' + error.message);
                    console.error('❌ 에러:', error);
                }
            });
        });
    </script>
    </script>
</body>
</html>
