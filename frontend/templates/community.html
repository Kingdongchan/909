<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daejeon Community - {{ place_name }}</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        /* 모달 스타일 추가 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none; /* 기본 숨김 */
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-overlay.show { display: flex; }
        
        .modal-box {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
        }

        /* 유틸리티 클래스 */
        .hidden { display: none !important; }
        .block { display: block !important; }

        /* 입력 폼 스타일 */
        .input-group { margin-bottom: 1rem; }
        .input-group label { display: block; margin-bottom: 0.5rem; color: #64748b; }
        .input-group input, .input-group textarea {
            width: 100%; padding: 0.75rem;
            border: 1px solid #e2e8f0; border-radius: 0.5rem;
        }
        
        /* 버튼 그룹 */
        .btn-group { display: flex; gap: 0.5rem; margin-top: 1rem; justify-content: flex-end; }
        .btn { padding: 0.5rem 1rem; border-radius: 0.5rem; border: none; cursor: pointer; font-weight: 600; }
        .btn-primary { background: #22d3ee; color: white; }
        .btn-secondary { background: #e2e8f0; color: #64748b; }
        .btn-danger { background: #ef4444; color: white; }

        /* 로딩 스피너 */
        #loading-spinner {
            text-align: center; margin: 1rem 0; color: #22d3ee; font-weight: bold;
        }
    </style>
</head>
<body class="bg-gray-50">

    <div class="community-layout">
        <main class="main-content">
            
            <h1 style="margin-bottom: 1rem;">{{ place_name }} 커뮤니티</h1>

            <!-- 글 작성 영역 (기존 버튼 대신 바로 입력 폼 노출) -->
            <div class="top-bar">
                <h3>새 글 작성</h3>
                <div class="input-group" style="margin-top: 1rem;">
                    <input type="text" id="input-title" placeholder="제목을 입력하세요">
                </div>
                <div class="input-group">
                    <textarea id="input-content" rows="3" placeholder="내용을 입력하세요"></textarea>
                </div>
                <button id="btn-save" class="btn btn-primary">저장</button>
            </div>

            <div class="post-list" id="post-list">
                <!-- 게시글 목록이 여기에 들어옵니다 -->
                <p style="color: #64748b;">게시글을 불러오는 중...</p>
            </div>
        </main>
    </div>

    <!-- 1. 모달 전체 영역 (btn-save-modal) -->
    <div id="btn-save-modal" class="modal-overlay">
        <div class="modal-box">
            
            <!-- 13. DB 로딩 버튼 (loading-spinner) -->
            <div id="loading-spinner" class="hidden">데이터 불러오는 중...</div>

            <!-- 2. DB 데이터 뷰 영역 (modal-db-data) -->
            <div id="modal-db-data">
                <h2 id="modal-db-title" style="margin-bottom: 1rem;"></h2> <!-- 3 -->
                <p id="modal-db-content" style="color: #475569; margin-bottom: 1.5rem; white-space: pre-wrap;"></p> <!-- 4 -->
                
                <div class="btn-group">
                    <!-- 8. 모달 안 수정 버튼 -->
                    <button id="modal-btn-update" class="btn btn-secondary hidden">수정</button>
                    <!-- 11. 모달 안 삭제 버튼 -->
                    <button id="modal-btn-delete" class="btn btn-danger hidden">삭제</button>
                </div>
            </div>

            <!-- 5. 수정 모달 영역 (update-input-modal-data) -->
            <div id="update-input-modal-data" class="hidden">
                <div class="input-group">
                    <label>제목 수정</label>
                    <!-- 6. 모달 안 들어갈 제목 input -->
                    <input type="text" id="update-input-modal-title">
                </div>
                <div class="input-group">
                    <label>내용 수정</label>
                    <!-- 7. 모달 안 들어갈 내용 textarea -->
                    <textarea id="update-input-modal-content" rows="4"></textarea>
                </div>

                <div class="btn-group">
                    <!-- 9. 모달 안 수정 완료 버튼 -->
                    <button id="modal-btn-update-ok" class="btn btn-primary">수정 완료</button>
                    <!-- 10. 모달 안 수정 취소 -->
                    <button id="modal-btn-not-update" class="btn btn-secondary">취소</button>
                </div>
            </div>

            <hr style="margin: 1.5rem 0; border: 0; border-top: 1px solid #f1f5f9;">
            
            <div style="text-align: right;">
                <!-- 12. 모달 안 닫기 버튼 -->
                <button id="modal-btn-close" class="btn btn-secondary">닫기</button>
            </div>
        </div>
    </div>

    <script>
        // 전역 변수: 현재 접속한(또는 방금 글을 쓴) 유저 ID와 현재 보고 있는 피드 ID
        let currentUserId = null; 
        let currentFeedId = null;

        // DOM 요소 가져오기
        const modal = document.getElementById('btn-save-modal');
        const loadingSpinner = document.getElementById('loading-spinner');
        
        // View Elements
        const viewContainer = document.getElementById('modal-db-data');
        const viewTitle = document.getElementById('modal-db-title');
        const viewContent = document.getElementById('modal-db-content');
        const btnUpdate = document.getElementById('modal-btn-update');
        const btnDelete = document.getElementById('modal-btn-delete');
        
        // Edit Elements
        const editContainer = document.getElementById('update-input-modal-data');
        const editInputTitle = document.getElementById('update-input-modal-title');
        const editInputContent = document.getElementById('update-input-modal-content');
        
        // 페이지 로드 시 게시글 목록 불러오기
        document.addEventListener('DOMContentLoaded', loadPosts);

        // *** 저장 버튼 클릭 이벤트 (btn-save) ***
        document.getElementById('btn-save').addEventListener('click', async () => {
            const title = document.getElementById('input-title').value;
            const content = document.getElementById('input-content').value;

            if (!title || !content) {
                alert("제목과 내용을 모두 입력해주세요.");
                return;
            }

            console.log("💾 [저장 시작] 서버로 데이터 전송 중...");

            try {
                // 1. DB 저장 요청
                const response = await fetch('/user_input', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, content })
                });

                if (!response.ok) throw new Error('저장 실패');

                const data = await response.json();
                console.log("✅ [저장 완료] DB 응답:", data);

                // 방금 글을 쓴 사람이 '나'이므로 ID 저장 (새로고침 전까지 유지)
                currentUserId = data.user_id; 
                currentFeedId = data.id;

                // 입력창 초기화
                document.getElementById('input-title').value = '';
                document.getElementById('input-content').value = '';

                // 목록 갱신
                loadPosts();

                // 2. 모달 띄우기 및 데이터 세팅
                openModal(data);

            } catch (error) {
                console.error("❌ 에러 발생:", error);
                alert("저장 중 오류가 발생했습니다.");
            }
        });

        // *** 게시글 목록 불러오기 함수 ***
        async function loadPosts() {
            const postList = document.getElementById('post-list');
            
            try {
                const response = await fetch('/get_data');
                const posts = await response.json();

                postList.innerHTML = ''; // 초기화

                if (!posts || posts.length === 0) {
                    postList.innerHTML = '<p style="color: #64748b;">아직 작성된 게시글이 없습니다.</p>';
                    return;
                }

                // 최신글 순서로 정렬 (ID 내림차순)
                posts.sort((a, b) => b.id - a.id);

                posts.forEach(post => {
                    const card = document.createElement('div');
                    card.className = 'post-card'; // styles.css 스타일 적용
                    // 스타일 보정 (CSS 파일에 없는 경우를 대비)
                    card.style.cursor = 'pointer';
                    card.style.marginBottom = '1rem';
                    card.style.background = 'white';
                    card.style.padding = '1.5rem';
                    card.style.borderRadius = '1rem';
                    card.style.boxShadow = '0 1px 2px 0 rgb(0 0 0 / 0.05)';
                    
                    card.innerHTML = `
                        <div>
                            <h3 style="margin-bottom: 0.5rem; font-size: 1.1rem;">${post.title}</h3>
                            <p style="color: #64748b; font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${post.content}</p>
                        </div>
                    `;
                    
                    // 카드 클릭 시 상세보기 모달 열기
                    card.addEventListener('click', () => {
                        // 클릭한 게시글의 ID를 현재 ID로 설정
                        currentFeedId = post.id;
                        // (주의: 로그인 기능이 없으므로 새로고침 후 목록에서 글을 클릭하면 본인 글이라도 수정 버튼은 안 뜹니다)
                        openModal(post);
                    });
                    
                    postList.appendChild(card);
                });

            } catch (error) {
                console.error("목록 로드 실패:", error);
                postList.innerHTML = '<p style="color: red;">게시글을 불러오는 데 실패했습니다.</p>';
            }
        }

        // 모달 열기 및 데이터 표시 함수
        function openModal(data) {
            console.log("📂 [모달 열기] 데이터 로딩:", data);
            
            modal.classList.add('show');
            viewContainer.classList.remove('hidden');
            editContainer.classList.add('hidden');

            // DB 데이터 넣기
            viewTitle.innerText = data.title;
            viewContent.innerText = data.content;

            // 작성자 확인 (user_id 비교)
            if (data.user_id === currentUserId) {
                console.log("🔐 작성자 본인 확인됨: 수정/삭제 버튼 표시");
                btnUpdate.classList.remove('hidden');
                btnDelete.classList.remove('hidden');
            } else {
                console.log("🔒 작성자 불일치: 수정/삭제 버튼 숨김");
                btnUpdate.classList.add('hidden');
                btnDelete.classList.add('hidden');
            }
        }

        // *** 수정 버튼 클릭 (modal-btn-update) ***
        btnUpdate.addEventListener('click', () => {
            console.log("✏️ [수정 모드] 전환");
            viewContainer.classList.add('hidden');
            editContainer.classList.remove('hidden');

            // 기존 내용 input에 채우기
            editInputTitle.value = viewTitle.innerText;
            editInputContent.value = viewContent.innerText;
        });

        // *** 수정 취소 버튼 (modal-btn-not-update) ***
        document.getElementById('modal-btn-not-update').addEventListener('click', () => {
            console.log("↩️ [수정 취소] 뷰 모드로 복귀");
            editContainer.classList.add('hidden');
            viewContainer.classList.remove('hidden');
        });

        // *** 수정 완료 버튼 (modal-btn-update-ok) ***
        document.getElementById('modal-btn-update-ok').addEventListener('click', async () => {
            const newTitle = editInputTitle.value;
            const newContent = editInputContent.value;

            console.log("💾 [수정 요청] DB 업데이트 시작...");
            loadingSpinner.classList.remove('hidden'); // 로딩 표시
            editContainer.classList.add('hidden'); // 입력창 일단 숨김

            try {
                const response = await fetch(`/feed/${currentFeedId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: newTitle, content: newContent })
                });

                if (!response.ok) throw new Error('수정 실패');

                const updatedData = await response.json();
                console.log("✅ [수정 완료] 업데이트된 데이터:", updatedData);

                // UI 업데이트 (수정된 내용 반영)
                viewTitle.innerText = updatedData.title;
                viewContent.innerText = updatedData.content;

                // 목록 갱신
                loadPosts();

                // 뷰 모드로 복귀
                loadingSpinner.classList.add('hidden');
                viewContainer.classList.remove('hidden');

            } catch (error) {
                console.error("❌ 수정 에러:", error);
                alert("수정에 실패했습니다.");
                loadingSpinner.classList.add('hidden');
                editContainer.classList.remove('hidden'); // 에러나면 다시 수정창 보여주기
            }
        });

        // *** 삭제 버튼 (modal-btn-delete) ***
        btnDelete.addEventListener('click', async () => {
            if(!confirm("정말로 삭제하시겠습니까?")) return;

            console.log("🗑️ [삭제 요청] 게시글 삭제 중...");
            try {
                const response = await fetch(`/feed/${currentFeedId}`, { method: 'DELETE' });
                if (!response.ok) throw new Error('삭제 실패');

                console.log("✅ [삭제 완료]");
                alert("삭제되었습니다.");
                modal.classList.remove('show'); // 모달 닫기
                
                // 목록 갱신
                loadPosts();

            } catch(error) {
                console.error("❌ 삭제 에러:", error);
                alert("삭제 중 오류가 발생했습니다.");
            }
        });

        // *** 닫기 버튼 (modal-btn-close) ***
        document.getElementById('modal-btn-close').addEventListener('click', () => {
            console.log("✖️ [모달 닫기]");
            modal.classList.remove('show');
        });
    </script>
</body>
</html>
